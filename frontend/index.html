<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тренер Миша</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <h1>Тренер Миша</h1>
      <div id="controls">
        <button id="connect">Connect</button>
        <button id="disconnect" disabled>Disconnect</button>
      </div>
      <p id="status">Disconnected</p>

      <div id="ptt">
        <div id="mic-indicator" class="muted">🔇 Микрофон выключен</div>
        <div id="ptt-settings">
          <label>
            Режим:
            <select id="ptt-mode">
              <option value="toggle">Toggle (вкл/выкл)</option>
              <option value="hold">Hold (зажать)</option>
            </select>
          </label>
          <button id="ptt-rebind">Клавиша: <kbd id="ptt-key">—</kbd></button>
        </div>
      </div>

      <div id="activity"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
